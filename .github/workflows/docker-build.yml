name: Go Build to GHCR

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 0.3.0)'
        required: true
        default: '0.3.0'
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout kód
        uses: actions/checkout@v4

      - name: Bejelentkezés a GHCR-be
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker képfájl megépítése és feltöltése
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/iverbs:latest
            ghcr.io/${{ github.repository_owner }}/iverbs:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/iverbs:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/iverbs:${{ inputs.version }}