<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IVERBS {{ .version }}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <nav>
        <div>
            <h1 style="display: inline-block; margin-right: 8px;">IVERBS</h1>
            <span class="version">{{ .version }}</span>
        </div>
        <div class="nav-buttons">
            <!-- nincs refresh cache gomb -->
        </div>
    </nav>

    <div class="tabs" id="tabs"></div>

    <div class="main-panel">
        <div class="tree-panel" id="treePanel">
            <div class="tree-header">
                <span>📁 Folders</span>
                <label class="watch-checkbox" style="margin-left: auto; display: flex; align-items: center; gap: 5px;">
                    <input type="checkbox" id="watchToggle"> Watch
                </label>
            </div>
            <div id="tree"></div>
        </div>
        <div class="content-panel">
            <div class="pagination-container">
                <div class="pagination" id="pagination"></div>
            </div>
            <div class="filter-container">
                <div class="filter">
                    <label><input type="checkbox" id="missingOnly"> Missing only</label>
                    <button id="autoFixBtn" class="btn">Write</button>
                </div>
            </div>
            <div class="file-list">
                <table id="fileTable" style="width: 100%;">
                    <thead>
                        <tr><th>Name</th><th>Estimated date</th><th>EXIF?</th><th>Action</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // Beágyazzuk a sources listát a Go sablonból
    window.sources = {{ .sources }};
</script>
<script src="/static/script.js"></script>
</body>
</html>
