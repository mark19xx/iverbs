<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IVERBS 0.2</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <nav>
        <h1>IVERBS</h1>
        <div class="nav-buttons">
            <button id="startWatchdog" class="btn">▶ Watch</button>
            <button id="stopWatchdog" class="btn">⏹️ Watch</button>
            <button id="refreshCache" class="btn">⟳ Refresh cache</button>
        </div>
    </nav>

    <div class="tabs" id="tabs"></div>

    <div class="main-panel">
        <div class="tree-panel" id="treePanel">
            <div class="tree-header">📁 Folders</div>
            <div id="tree"></div>
        </div>
        <div class="content-panel">
            <div class="toolbar">
                <div class="pagination" id="pagination"></div>
                <div class="filter">
                    <label><input type="checkbox" id="missingOnly"> Missing only</label>
                    <label><input type="checkbox" id="overwriteFix"> Overwrite</label>
                    <button id="autoFixBtn" class="btn">Auto Fix (this page)</button>
                </div>
            </div>
            <div class="file-list">
                <table>
                    <thead>
                        <tr><th>Name</th><th>Estimated date</th><th>EXIF?</th><th>Action</th></tr>
                    </thead>
                    <tbody id="fileTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="console">
        <div class="console-header">Console <button id="clearConsole" class="btn-small">Clear</button></div>
        <pre id="consoleOutput"></pre>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
