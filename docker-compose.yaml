services:
  iverbs:
    build: .
    container_name: iverbs
    restart: unless-stopped
    ports:
      - "8080:5000"
    volumes:
      # A WATCH_SOURCES egy vesszővel elválasztott lista, minden elemet külön bindelünk
      - ${WATCH_SOURCES:-/home/user}:/watch/sources:rw
      - ${DATA_DIR:-/opt/docker/iverbs/data}:/data:rw
    environment:
      - WATCH_DIRS=${WATCH_SOURCES:-/home/user}
      - DB_PATH=/data/cache/iverbs.json
    stdin_open: true
    tty: true