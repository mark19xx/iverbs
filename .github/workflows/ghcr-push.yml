name: Image áttöltése GHCR-re
on: 
  workflow_dispatch: # Ez teszi lehetővé, hogy kézzel, gombnyomásra indítsd

jobs:
  push-to-ghcr:
    runs-on: ubuntu-latest
    steps:
      - name: Bejelentkezés a GHCR-be
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Image letöltése a Release-ből
        run: |
          curl -L "https://github.com/mark19xx/iverbs/releases/download/iverbs-image-v0.1-alpha/iverbs.tar" -o iverbs.tar

      - name: Image betöltése és feltolása
        run: |
          docker load -i iverbs.tar
          # Megnézzük mi az image neve a tar-ban, és átcímkézzük a GHCR-hez
          IMAGE_ID=$(docker images --format "{{.Repository}}:{{.Tag}}" | head -n 1)
          docker tag $IMAGE_ID ghcr.io/mark19xx/iverbs:latest
          docker push ghcr.io/mark19xx/iverbs:latest

