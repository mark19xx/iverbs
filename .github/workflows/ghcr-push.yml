name: Image áttöltése GHCR-re
on: 
  workflow_dispatch:

jobs:
  push-to-ghcr:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Bejelentkezés a GHCR-be
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Image letöltése a Release-ből (Hitelesítéssel)
        run: |
          # A GitHub API-n keresztül kérjük le, hogy privát repónál is működjön
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/octet-stream" \
          "https://github.com/mark19xx/iverbs/releases/download/iverbs-image-v0.1-alpha/iverbs.tar" \
          -o iverbs.tar

      - name: Ellenőrzés (Hogy ne 9 byte legyen)
        run: ls -lh iverbs.tar

      - name: Image betöltése és feltolása
        run: |
          docker load -i iverbs.tar
          # Megkeressük az ID-t és feltoljuk
          IMAGE_ID=$(docker images -q | head -n 1)
          docker tag $IMAGE_ID ghcr.io/mark19xx/iverbs:latest
          docker push ghcr.io/mark19xx/iverbs:latest
