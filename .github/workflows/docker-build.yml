name: Create GitHub Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 0.3.0)'
        required: true
        default: '0.3.0'
        type: string

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout kód
        uses: actions/checkout@v4

      - name: Bejelentkezés a GHCR-be
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker image build és push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/iverbs:latest
            ghcr.io/${{ github.repository_owner }}/iverbs:${{ inputs.version }}
            ghcr.io/${{ github.repository_owner }}/iverbs:${{ github.sha }}

      - name: GitHub Release létrehozása
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: IVERBS ${{ inputs.version }}
          body: |
            IVERBS ${{ inputs.version }} – Go backend, hatékonyabb watchdog, SQLite cache
          draft: false
          prerelease: false