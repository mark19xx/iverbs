name: Image áttöltése GHCR-re
on: 
  workflow_dispatch:

jobs:
  push-to-ghcr:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Bejelentkezés a GHCR-be
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Image letöltése a Release-ből (Javított linkkel)
        run: |
          # A pontos link a te képed alapján:
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/octet-stream" \
          "https://github.com/mark19xx/iverbs/releases/download/v0.1-alpha/iverbs-image.tar" \
          -o iverbs-image.tar

      - name: Ellenőrzés
        run: ls -lh iverbs-image.tar

      - name: Image betöltése és feltolása
        run: |
          docker load -i iverbs-image.tar
          # Megkeressük az ID-t és feltoljuk
          IMAGE_ID=$(docker images -q | head -n 1)
          docker tag $IMAGE_ID ghcr.io/mark19xx/iverbs:latest
          docker push ghcr.io/mark19xx/iverbs:latest
