<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVERBS</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Template adatok meta tag-ekben -->
    <meta name="iverbs-version" content="{{.Version}}">
    <meta name="iverbs-sources" content="{{.Sources}}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="brand">IVERBS</span>
            <span class="version">{{.Version}}</span>
        </div>
    </nav>

    <div class="app-container">
        <div class="tabs-container" id="tabs">
            <!-- Dinamikusan töltve -->
        </div>

        <div class="main-panel">
            <div class="sidebar" id="sidebar">
                <h3>Folders</h3>
                <ul id="folder-tree" class="folder-tree"></ul>
            </div>

            <div class="content">
                <div class="toolbar">
                    <label class="checkbox-label">
                        <input type="checkbox" id="missing-only"> Missing only
                    </label>
                    <div class="batch-actions">
                        <button id="fix-page-btn" class="btn btn-primary">Fix Page</button>
                        <button id="fix-folder-btn" class="btn btn-primary">Fix Folder</button>
                        <button id="fix-all-btn" class="btn btn-primary">Fix All</button>
                    </div>
                </div>

                <div class="file-table-wrapper">
                    <table class="file-table" id="file-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Estimated Date</th>
                                <th>EXIF?</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="file-list-body"></tbody>
                    </table>
                </div>

                <div class="pagination-container">
                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
